{% extends "newsletter/base.html" %}

{% block newsletter_content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <h2>Unsubscribe</h2>
      <p>Are you sure you want to unsubscribe <strong>{{ subscriber.email }}</strong> from the DTRaleigh newsletter?</p>
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, unsubscribe me</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
