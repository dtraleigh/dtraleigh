<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DTRaleigh Newsletter</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f4;font-family:Arial,Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4;">
    <tr>
      <td align="center" style="padding:20px 10px;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff;max-width:600px;width:100%;">
          <!-- Header -->
          <tr>
            <td style="padding:24px 30px;background-color:#2c3e50;color:#ffffff;font-size:22px;font-weight:bold;">
              DTRaleigh
            </td>
          </tr>
          <!-- Content -->
          <tr>
            <td style="padding:30px;color:#333333;font-size:16px;line-height:1.6;">
              {{ html_content|safe }}
            </td>
          </tr>
          <!-- Read on the web -->
          <tr>
            <td style="padding:0 30px 30px 30px;">
              <a href="{{ post_url }}" style="display:inline-block;padding:10px 20px;background-color:#007bff;color:#ffffff;text-decoration:none;border-radius:4px;font-size:14px;">Read on the web</a>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:20px 30px;background-color:#f8f9fa;color:#888888;font-size:12px;line-height:1.5;border-top:1px solid #eeeeee;">
              <p style="margin:0 0 10px 0;">You're receiving this because you subscribed at dtraleigh.com.</p>
              <p style="margin:0 0 10px 0;"><a href="{{ unsubscribe_url }}" style="color:#007bff;text-decoration:underline;">Unsubscribe</a></p>
              <p style="margin:0;">{{ mailing_address }}</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
